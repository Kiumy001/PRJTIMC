<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>Calculadora IMC</h2>
    <input type="number" id="peso" placeholder="Peso (ex: 80)" step="0.1">
    <input type="number" id="altura" placeholder="Altura (ex: 1.80)" step="0.01">
    <button onclick="calcular()">Calcular IMC</button>

    <div id="resultado"></div>
</div>

<script>
    async function calcular() {
        const peso = document.getElementById('peso').value;
        const altura = document.getElementById('altura').value;
        const divResultado = document.getElementById('resultado');

        if (!peso || !altura) {
            alert("Preencha todos os campos!");
            return;
        }

        try {
            const response = await fetch('http://localhost:3000/calcular-imc', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ peso: parseFloat(peso), altura: parseFloat(altura) })
            });

            const dados = await response.json();

            divResultado.style.display = 'block';
            divResultado.className = 'sucesso';
            divResultado.innerHTML = `<strong>IMC:</strong> ${dados.imc} <br> <strong>Status:</strong> ${dados.classificacao}`;
            
        } catch (error) {
            alert("Erro ao conectar com o servidor. Verifique se o Express está rodando!");
        }
    }
</script>

</body>
</html>
