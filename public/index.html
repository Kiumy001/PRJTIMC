<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMC</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Calcular IMC</h1>

      <div class="pedido">
        <h2>Coloque suas informações</h2>

        <input type="text" id="peso" placeholder="Seu Peso(KG)" />
        <input
          type="text"
          id="altura"
          placeholder="Sua Altura(Ex:1.50)"
          step="0.01"
          min="0"
        />
        <ul id="dados"></ul>

        <br />
        <button id="calcular-imc">Calcular</button>
        <button id="salvar-dados">Salvar</button>
        <p>IMC: <span id="resultado">...</span></p>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
